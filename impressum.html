<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XELISTIC — Impressum</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="alternate icon" href="icon.ico">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  @font-face {
  font-family: 'DM Mono';
  src: url('DMMono-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  }

  @font-face {
  font-family: 'DM Mono';
  src: url('DMMono-Light.ttf') format('truetype');
  font-weight: 300;
  font-style: normal;
  }

  @font-face {
  font-family: 'DM Mono';
  src: url('DMMono-Medium.ttf') format('truetype');
  font-weight: 500;
  font-style: normal;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .nav-mark {
  width: 20px;
  height: 20px;
  margin-right: 0.6rem;

  display: inline-block;
  vertical-align: middle;
  transform: translateY(-1px);

  opacity: 1.1;
  }
	
  :root {
    --black:   #0a0a0a;
    --dark:    #111111;
    --panel:   #161616;
    --border:  #242424;
    --neon:    #218a32;
    --white:   #f5f5f0;
    --muted:   #666660;
    --dim:     #333330;
  }

  html { font-size: 16px; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 4rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(255,255,255,0.012) 2px,
      rgba(255,255,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2.5rem;
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
  }

  .nav-logo span { color: var(--neon); }

  nav ul {
    display: flex;
    gap: 2rem;
    list-style: none;
    align-items: center;
  }

  nav a {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }

  nav a:hover,
  nav a.active { color: var(--neon); }

  /* ── PAGE HEADER ── */
  .page-header {
    border-bottom: 1px solid var(--border);
    padding: 3.5rem 2.5rem 2.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
  }

  .page-eyebrow {
    font-size: 0.6rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--neon);
    margin-bottom: 1rem;
  }

  .page-title {
    font-size: clamp(2rem, 5vw, 3.8rem);
    font-weight: 500;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    line-height: 0.95;
  }

  .page-title em {
    font-style: italic;
    font-weight: 300;
    color: var(--muted);
  }

  .page-meta {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
    text-align: right;
    flex-shrink: 0;
  }

  /* ── CONTENT ── */
  .content {
    max-width: 820px;
    padding: 3rem 2.5rem;
  }

  .legal-section {
    margin-bottom: 3rem;
    padding-bottom: 3rem;
    border-bottom: 1px solid var(--border);
  }

  .legal-section:last-child {
    border-bottom: none;
  }

  .section-number {
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--neon);
    margin-bottom: 0.6rem;
  }

  .section-title {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 1.5rem;
  }

  .section-body p {
    font-size: 0.8rem;
    line-height: 1.95;
    color: rgba(245,245,240,0.6);
    letter-spacing: 0.02em;
    margin-bottom: 0.75rem;
  }

  .section-body p:last-child { margin-bottom: 0; }

  .section-body a {
    color: var(--neon);
    text-decoration: none;
    border-bottom: 1px solid rgba(33, 138, 50,0.3);
    transition: border-color 0.15s;
  }

  .section-body a:hover { border-color: var(--neon); }

  /* placeholder inline hint */
  .fill {
    display: inline;
    color: var(--neon);
    font-style: italic;
    opacity: 0.7;
  }

  .fill-block {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border: 1px dashed rgba(33, 138, 50,0.3);
    color: rgba(33, 138, 50,0.6);
    font-size: 0.7rem;
    font-style: italic;
    margin: 0.15rem 0;
    letter-spacing: 0.04em;
  }

  /* ── FOOTER ── */
  .page-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    border-top: 1px solid var(--border);
    background: var(--black);
    padding: 0.6rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 50;
  }

  .footer-left {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .footer-right {
    display: flex;
    gap: 2rem;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .footer-right a {
    color: var(--dim);
    text-decoration: none;
    transition: color 0.15s;
  }

  .footer-right a:hover { color: var(--muted); }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
  <img src="icon.svg" class="nav-mark" alt="">
  XELISTIC
  </a>
  <ul>
    <li><a href="index.html">Home</a></li>
  </ul>
</nav>

<header class="page-header">
  <div>
    <div class="page-eyebrow">Rechtliche Informationen</div>
    <h1 class="page-title">Im<em>pressum</em></h1>
  </div>
  <div class="page-meta">
    Gemäß § 5 DDG<br>
    Stand: 2026
  </div>
</header>

<main class="content">

  <div class="legal-section">
    <div class="section-number">01</div>
    <div class="section-title">Angaben gemäß § 5 DDG</div>
    <div class="section-body">
      <p>
        <span class="fill-block">Antoni Noworyta</span><br>
      </p>
    </div>
  </div>

  <div class="legal-section">
    <div class="section-number">02</div>
    <div class="section-title">Kontakt</div>
    <div class="section-body">
      <p>
        E-Mail: <span class="fill-block">antnoworyta@gmail.com</span><br>
        <!-- Telefon: <span class="fill-block">optional</span> -->
      </p>
    </div>
  </div>

  <div class="legal-section">
    <div class="section-number">03</div>
    <div class="section-title">Verantwortlich für den Inhalt nach § 18 Abs. 2 MStV</div>
    <div class="section-body">
      <p>
        <span class="fill-block">Antoni Noworyta</span><br>
      </p>
    </div>
  </div>


</main>

<footer class="page-footer">
  <span class="footer-left">© 2026 Xelistic — All rights reserved</span>
  <div class="footer-right">
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
  </div>
</footer>

</body>
</html>
