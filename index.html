<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XELISTIC — Under Construction</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="alternate icon" href="icon.ico">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @font-face {
  font-family: 'DM Mono';
  src: url('DMMono-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  }

  @font-face {
  font-family: 'DM Mono';
  src: url('DMMono-Light.ttf') format('truetype');
  font-weight: 300;
  font-style: normal;
  }

  @font-face {
  font-family: 'DM Mono';
  src: url('DMMono-Medium.ttf') format('truetype');
  font-weight: 500;
  font-style: normal;
  }
	
  .nav-mark {
  width: 20px;
  height: 20px;
  margin-right: 0.6rem;

  display: inline-block;
  vertical-align: middle;
  transform: translateY(-1px);	
  
  opacity: 1.1;
  }

  :root {
    --black:   #0a0a0a;
    --dark:    #111111;
    --panel:   #161616;
    --border:  #242424;
    --neon:    #218a32;
    --white:   #f5f5f0;
    --muted:   #666660;
    --dim:     #333330;
  }

  html { font-size: 16px; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCANLINE TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.012) 2px,
      rgba(255,255,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2.5rem;
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
  }

  .nav-logo span { color: var(--neon); }

  .nav-right {
    display: flex;
    gap: 2rem;
    list-style: none;
    align-items: center;
  }

  .nav-right a {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .nav-right a:hover, nav a.active { color: var(--neon); }

  /* ── HERO ── */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: calc(100vh - 61px);
  }

  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 5rem 3rem 5rem 2.5rem;
    border-right: 1px solid var(--border);
    position: relative;
  }

  .hero-eyebrow {
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--neon);
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 28px;
    height: 1px;
    background: var(--neon);
  }

  .hero-headline {
    font-size: clamp(3.5rem, 7vw, 6.5rem);
    font-weight: 500;
    line-height: 0.92;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 2.5rem;
  }

  .hero-headline .slash {
    color: var(--neon);
    font-style: italic;
    font-weight: 300;
  }

  .hero-body {
    font-size: 0.78rem;
    line-height: 1.8;
    color: var(--muted);
    max-width: 380px;
    margin-bottom: 3rem;
    letter-spacing: 0.03em;
  }

  /* status tracker */
  .status-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.85rem 0;
    border-top: 1px solid var(--border);
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .status-item:last-child { border-bottom: 1px solid var(--border); }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-done     { background: var(--neon); box-shadow: 0 0 8px var(--neon); }
  .dot-progress { background: #f5a623; box-shadow: 0 0 8px #f5a623; }
  .dot-pending  { background: var(--dim); }

  .status-name { flex: 1; color: var(--white); }
  .status-tag  { color: var(--muted); font-size: 0.58rem; }
  .status-tag.active { color: var(--neon); }

  /* ── HERO RIGHT ── */
  .hero-right {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 2.5rem;
    position: relative;
    background: var(--panel);
    overflow: hidden;
  }

  /* big background text */
  .bg-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(6rem, 14vw, 12rem);
    font-weight: 500;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.03);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
    line-height: 1;
  }

  /* diagonal stripe accent */
  .hero-right::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 180px;
    height: 180px;
    border: 1px solid var(--neon);
    transform: rotate(45deg);
    opacity: 0.08;
  }

  .corner-tag {
    position: absolute;
    top: 2rem;
    left: 2.5rem;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .corner-tag-br {
    position: absolute;
    bottom: 7rem;
    right: 2.5rem;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
    text-align: right;
  }

  /* notify form */
  .notify-section {
    position: relative;
    z-index: 2;
    border-top: 1px solid var(--border);
    padding-top: 1.5rem;
  }

  .notify-label {
    font-size: 0.58rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }

  .notify-form {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .notify-form:focus-within { border-color: var(--neon); }

  .notify-input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 0.8rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    color: var(--white);
    outline: none;
    min-width: 0;
  }

  .notify-input::placeholder { color: var(--dim); }

  .notify-btn {
    background: var(--neon);
    border: none;
    padding: 0.8rem 1.25rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--black);
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }

  .notify-btn:hover { background: #218a32; }

  /* bottom ticker */
  .ticker {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    border-top: 1px solid var(--border);
    background: var(--black);
    padding: 0.6rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 50;
  }

  .ticker-left {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .ticker-right {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
    display: flex;
    gap: 2rem;
  }

  .ticker-right a {
    color: var(--dim);
    text-decoration: none;
    transition: color 0.15s;
  }

  .hero-image {
  position: absolute;
  inset: 0;

  width: 100%;
  height: 100%;

  object-fit: cover;
  object-position: center;

  opacity: 0.12;

  filter:
    grayscale(100%)
    brightness(0.7)
    contrast(1.2)
    sepia(1)
    hue-rotate(65deg)
    saturate(2);

  mix-blend-mode: screen;

  pointer-events: none;
  user-select: none;

  z-index: 1;

  mask-image: linear-gradient(
    to left,
    rgba(0,0,0,1),
    rgba(0,0,0,0)
  );
}

  .ticker-right a:hover { color: var(--muted); }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
  <img src="icon.svg" class="nav-mark" alt="">
  XELISTIC
  </a>
  <ul class="nav-right">
  </ul>
</nav>

<section class="hero">

  <div class="hero-left">
    <div class="hero-eyebrow">Something beautiful is growing</div>

    <h1 class="hero-headline">
      XE<span class="slash">/</span><br>
      LIS<br>
      TIC
    </h1>

    <p class="hero-body">
      Etwas Neues entsteht<br>
      Mit Liebe ❤️<br>
      Wir arbeiten daran — bald live
    </p>

    <ul class="status-list">
      <li class="status-item">
        <span class="status-dot dot-done"></span>
        <span class="status-name">Domain & Hosting</span>
        <span class="status-tag active">Fertig</span>
      </li>
      <li class="status-item">
        <span class="status-dot dot-progress"></span>
        <span class="status-name">Design & Entwicklung</span>
        <span class="status-tag">In Arbeit</span>
      </li>
      <li class="status-item">
        <span class="status-dot dot-pending"></span>
        <span class="status-name">Launch</span>
        <span class="status-tag">—</span>
      </li>
    </ul>
  </div>

  <div class="hero-right">
    <img src="misty.png" alt="" class="hero-image">
    <div class="bg-text">MISTY</div>
    <span class="corner-tag">v0.1 — Pre-launch</span>
    <span class="corner-tag-br">Bayern, DE<br>2026</span>
</section>

<footer class="ticker">
  <span class="ticker-left">© 2026 Xelistic — All rights reserved</span>
  <div class="ticker-right">
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
  </div>
</footer>

</body>
</html>
